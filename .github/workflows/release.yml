name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (for example, v1.2.3)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,wasm32-unknown-unknown
          - platform: macos-13
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin,wasm32-unknown-unknown
          - platform: windows-latest
            args: ''
            rust-targets: wasm32-unknown-unknown
          - platform: ubuntu-22.04
            args: --bundles deb,rpm,appimage
            rust-targets: wasm32-unknown-unknown

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[^[:space:]]+$ ]]; then
            echo "Manual releases require a v-prefixed tag." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        if: env.ACT != 'true'
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf \
            rpm

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build bundles
        if: env.ACT == 'true'
        run: pnpm exec tauri build ${{ matrix.args }}

      - name: Build and release
        if: env.ACT != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: wovo v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
